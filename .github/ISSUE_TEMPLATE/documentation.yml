name: Documentation
description: Report documentation errors or suggest improvements.
title: "[Docs]: "
labels:
  - documentation

body:
  - type: input
    id: page
    attributes:
      label: Documentation page

  - type: textarea
    id: issue
    attributes:
      label: What's incorrect or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
