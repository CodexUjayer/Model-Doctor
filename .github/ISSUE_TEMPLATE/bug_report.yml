name: Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue.

        Before submitting:
        - Verify you're using the latest version.
        - Search existing issues.
        - Provide a minimal reproducible example.

  - type: input
    id: version
    attributes:
      label: ModelDoctor Version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g. Python 3.11
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error message / Traceback
      render: shell

  - type: textarea
    id: code
    attributes:
      label: Minimal reproducible example
      render: python

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Other
