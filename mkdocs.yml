site_name: ModelDoctor
site_description: The complete developer handbook for learning, understanding, and mastering ModelDoctor.
site_url: https://example.com/modeldoctor

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Dashboard: getting-started/dashboard.md
    - CLI: getting-started/cli.md
  - Core Concepts:
    - Health Score: concepts/health-score.md
    - Diagnostic Doctors: concepts/diagnostic-doctors.md
    - Evaluation Context: concepts/evaluation-context.md
    - Findings: concepts/findings.md
    - Prescriptions: concepts/prescriptions.md
    - Reports: concepts/reports.md
  - User Guides:
    - Classification: guides/classification.md
    - Regression: guides/regression.md
    - Comparison: guides/comparison.md
    - Explainability: guides/explainability.md
    - Calibration: guides/calibration.md
    - MLflow Integration: guides/mlflow.md
    - Plugins: guides/plugins.md
    - Dashboard Customization: guides/dashboard-customization.md
  - Examples:
    - Basic Usage: examples/basic.md
    - Advanced Usage: examples/advanced.md
  - API Reference: api/reference.md
  - FAQ: faq.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Troubleshooting: troubleshooting.md
  - Validation Lab: validation.md
